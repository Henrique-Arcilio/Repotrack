services:
  backend:
    build: .

    env_file:
      - .env

    ports:
      - "8080:8080"

    depends_on:
      - postgres

  postgres:
    image: postgres:17

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
